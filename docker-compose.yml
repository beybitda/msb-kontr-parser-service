services:
  msb-kontr-parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: msb-kontr-parser-service:latest
    container_name: msb-kontr-parser-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/health', timeout=3).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - msb-net

networks:
  msb-net:
    driver: bridge

volumes:
  oracle-dev-data:
